<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парсер мін</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23181b21'/%3E%3Cpath d='M32 8v10M32 46v10M8 32h10M46 32h10M15 15l7 7M42 42l7 7M49 15l-7 7M22 42l-7 7' fill='none' stroke='%23ef4444' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23ef4444'/%3E%3Ccircle cx='27' cy='27' r='4' fill='%23fecaca'/%3E%3Ccircle cx='36' cy='36' r='5' fill='%23b91c1c'/%3E%3C/svg%3E">
    <script>
        (() => {
            const savedTheme = localStorage.getItem('mines-parser-theme');
            document.documentElement.dataset.theme = savedTheme || 'dark';
        })();
    </script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #1e1e1e;
            --page-surface: #181b21;
            --surface: #21252d;
            --surface-muted: #13151a;
            --floating-surface: #181b21;
            --status-surface: #21252d;
            --border: #2e3440;
            --border-hover: #434c5e;
            --border-focus: #3b82f6;
            --text: #f3f4f6;
            --textarea-text: #f3f4f6;
            --muted: #9ca3af;
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --button: #21252d;
            --button-hover: #2e3440;
            --button-text: #f3f4f6;
            --copy-text: #f3f4f6;
            --copy-bg: #21252d;
            --copy-hover: #2e3440;
            --kbd-bg: #21252d;
            --kbd-border: #434c5e;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #eef1f6;
            --page-surface: #ffffff;
            --surface: #f8fafc;
            --surface-muted: #ffffff;
            --floating-surface: #ffffff;
            --status-surface: #ffffff;
            --border: #d8dee9;
            --border-hover: #c4cdd8;
            --border-focus: #3b82f6;
            --text: #1f2937;
            --textarea-text: #1f2937;
            --muted: #6b7280;
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --success: #059669;
            --button: #f8fafc;
            --button-hover: #e5e7eb;
            --button-text: #1f2937;
            --copy-text: #1f2937;
            --copy-bg: #f8fafc;
            --copy-hover: #e5e7eb;
            --kbd-bg: #f8fafc;
            --kbd-border: #d8dee9;
            --shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -1px rgba(15, 23, 42, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-width: 0;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            transition: color 180ms ease, background-color 180ms ease;
        }

        button,
        textarea {
            font: inherit;
        }

        .page {
            width: min(100%, 1680px);
            margin: 0 auto;
            padding: 12px;
            background: var(--page-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: clamp(22px, 2.6vw, 28px);
            line-height: 1.2;
            letter-spacing: -0.015em;
        }

        .subtitle {
            max-width: 680px;
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .hero-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-pill {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            min-height: 34px;
            padding: 6px 10px;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            background: var(--status-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: none;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--muted);
            border-radius: 50%;
        }

        .status-pill.ready .status-dot {
            background: var(--success);
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.13);
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .panel {
            min-width: 0;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: none;
        }

        .panel-header {
            min-height: 58px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            display: block;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
        }

        .panel-hint {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }

        .counter {
            flex: 0 0 auto;
            color: var(--muted);
            font: 700 12px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        textarea {
            display: block;
            width: 100%;
            min-height: 500px;
            padding: 10px;
            color: var(--textarea-text);
            font: 15px/1.55 Consolas, ui-monospace, SFMono-Regular, monospace;
            background: transparent;
            border: 0;
            border-radius: 0;
            outline: none;
            resize: vertical;
            scrollbar-color: #475569 transparent;
        }

        textarea::placeholder {
            color: #64748b;
        }

        textarea:focus {
            background: var(--surface-muted);
            box-shadow: inset 0 0 0 1px var(--border-focus), inset 0 0 0 3px var(--accent-dim);
        }

        textarea[readonly] {
            background: var(--surface-muted);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 8px;
            padding: 0;
            background: transparent;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 16px;
            color: var(--button-text);
            font-size: 15px;
            font-weight: 500;
            background: var(--button);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
        }

        button:hover {
            background: var(--button-hover);
            border-color: var(--border-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus-visible {
            outline: 3px solid rgba(96, 165, 250, 0.4);
            outline-offset: 2px;
        }

        .btn-primary {
            min-width: 150px;
            color: white;
            background: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-strong);
        }

        .btn-ghost {
            color: var(--text);
            background: transparent;
            border-color: var(--border);
        }

        .btn-copy {
            flex: 0 0 auto;
            min-height: 30px;
            padding: 6px 10px;
            color: var(--copy-text);
            font-size: 13px;
            background: var(--copy-bg);
            border-color: var(--border);
        }

        .btn-copy:hover,
        .btn-copy.copied {
            color: var(--copy-text);
            background: var(--copy-hover);
        }

        .theme-toggle {
            min-height: 34px;
            padding: 6px 10px;
            color: var(--text);
            background: var(--status-surface);
            border-color: var(--border);
            box-shadow: none;
        }

        .theme-icon {
            width: 18px;
            font-size: 16px;
            line-height: 1;
        }

        .shortcut {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        kbd {
            padding: 3px 6px;
            color: var(--button-text);
            font: 700 11px ui-monospace, SFMono-Regular, Consolas, monospace;
            background: var(--kbd-bg);
            border: 1px solid var(--kbd-border);
            border-radius: 5px;
            box-shadow: 0 1px 0 #020617;
        }

        .app-footer {
            padding: 12px 4px 0;
            color: var(--muted);
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .workspace {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .input-panel {
                grid-column: 1 / -1;
            }

            textarea {
                min-height: 360px;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 6px;
            }

            .hero {
                align-items: stretch;
                gap: 8px;
            }

            .hero-actions {
                justify-content: space-between;
            }

            .workspace {
                grid-template-columns: minmax(0, 1fr);
            }

            .input-panel {
                grid-column: auto;
            }

            .panel-header {
                min-height: 56px;
            }

            textarea {
                min-height: 300px;
            }

            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .toolbar-actions,
            .toolbar-actions button {
                width: 100%;
            }

            .shortcut {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            button {
                transition: none;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="hero">
            <div>
                <h1>Парсер координат та мін</h1>
                <p class="subtitle">Вставте вихідне повідомлення, щоб згрупувати результати за статусом і конвертувати координати в MGRS.</p>
            </div>
            <div class="hero-actions">
                <button class="theme-toggle" id="themeToggle" type="button" onclick="toggleTheme()" aria-pressed="false" aria-label="Увімкнути світлу тему">
                    <span class="theme-icon" id="themeIcon" aria-hidden="true">☀</span>
                    <span id="themeLabel">День</span>
                </button>
                <div class="status-pill" id="statusPill" aria-live="polite">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="statusSummary">Очікує дані</span>
                </div>
            </div>
        </header>

        <section class="workspace" aria-label="Робоча область парсера">
            <article class="panel input-panel">
                <div class="panel-header">
                    <div>
                        <label class="panel-title" for="inputData">Вихідний текст</label>
                        <span class="panel-hint">Вставте повідомлення з координатами та статусами</span>
                    </div>
                    <span class="counter" id="inputCounter">0 символів</span>
                </div>
                <textarea id="inputData" spellcheck="false" placeholder="Наприклад:&#10;1. 5322780 7305139 ПТМ 2 шт ✅"></textarea>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <div>
                        <label class="panel-title" for="outputData">Результат</label>
                        <span class="panel-hint">Згруповано за статусом</span>
                    </div>
                    <button class="btn-copy" type="button" onclick="copyResult(this)" aria-label="Скопіювати звичайні координати">Копіювати</button>
                </div>
                <textarea id="outputData" readonly placeholder="Результат з’явиться після обробки"></textarea>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <div>
                        <label class="panel-title" for="outputMgrs">Координати MGRS</label>
                        <span class="panel-hint">Точність координат — 1 метр</span>
                    </div>
                    <button class="btn-copy" type="button" onclick="copyMgrsCoords(this)" aria-label="Скопіювати координати MGRS">Копіювати</button>
                </div>
                <textarea id="outputMgrs" readonly placeholder="MGRS-координати з’являться тут"></textarea>
            </article>
        </section>

        <div class="toolbar">
            <div class="toolbar-actions">
                <button class="btn-primary" type="button" onclick="processData()">Обробити текст</button>
                <button class="btn-ghost" type="button" onclick="clearData()">Очистити</button>
            </div>
            <span class="shortcut"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> — обробити</span>
        </div>

        <footer class="app-footer">Версія 2.1 (02.07.2026)</footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.10.0/proj4.js"></script>
    <script src="https://unpkg.com/mgrs/dist/mgrs.min.js"></script>
    <script>
        // Список сигнатур мін
        const SIGNATURES = [
            'ПТМР', 'ПТРМ', 'ПТМ', 'ПОМ', 'ОЗМ', 'ВОГ', 'ДЖ', 'ПЕЧЕНЬКИ',
            'ПАЛЕТКИ', 'ШАЙБА', 'КИСЛИНКА', 'ТМ', 'УК', 'ПМН', 'МОН', 'ПФМ',
            'РПГ', 'ПГ'
        ];

        const MINE_ROOT_RE = /^(?:пом|птм|тм|озм|вог|тбг|птмр|птрм|дж|ук|палет[а-яё]*|шайб[а-яё]*|кислин[а-яё]*)$/i;
        const INFLECTED_MINE_RE = /(?:палет[а-яё]*|шайб[а-яё]*|кислин[а-яё]*)/gi;
        const ALLOWED_MODIFIER_RE = /^(?:джоник.*|дж|обл)$/i;
        
        
        // Стоп-слова для обрізання назви міни в межах одного рядка
        const STOP_MARKERS = [
            'Высота', 'Расход', 'Рассход', 'сброс', 'потеря', 'птица', 
            'не бг', 'молния', 'перебивали', 'села', 'просад', 
            'перехват', 'акб', 'батарея', 'ветер', 'РЭБ'
        ];

        function normalize(text) {
            return text.normalize('NFKC').replace(/[\u202F\u00A0]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        // НАДІЙНИЙ ПОШУК КООРДИНАТ (навіть якщо вони злилися з літерами X/Y)
        function extractCoords(paragraph) {
            // Шукаємо числа від 6 до 8 цифр, перед якими й після яких НЕМАЄ інших цифр
            const matches = paragraph.match(/(?<!\d)\d{6,8}(?!\d)/g);
            if (matches && matches.length >= 2) {
                let x = matches[0];
                let y = matches[1];
                // Автокорекція X (починається на 5) та Y (починається на 7 або 6)
                if (y.startsWith('5') && (x.startsWith('7') || x.startsWith('6'))) {
                    [x, y] = [y, x];
                }
                return `${x} ${y}`;
            }
            return null;
        }

        // Покращений Розумний фільтр окремих слів міни
        function smartMineFilter(line) {
            let tokens = line.split(/\s+/);
            let hasMineRoot = false;
            
            for (let token of tokens) {
                let cleanToken = token.replace(/[.,\(\)]/g, '');
                if (MINE_ROOT_RE.test(cleanToken)) {
                    hasMineRoot = true;
                    break;
                }
            }
            
            if (!hasMineRoot) return line;
            
            let filteredTokens = [];
            for (let i = 0; i < tokens.length; i++) {
                let token = tokens[i];
                let cleanToken = token.replace(/[.,\(\)]/g, '');
                if (!cleanToken) continue;
                
                const isRoot = MINE_ROOT_RE.test(cleanToken);
                const isAllowedMod = ALLOWED_MODIFIER_RE.test(cleanToken);

                if (isRoot || isAllowedMod) {
                    filteredTokens.push(token);
                } else if (cleanToken.length <= 3 && !/^\d+$/.test(cleanToken)) {
                    // Короткі слова з літерами (наприклад "шт", "вт", "ук")
                    filteredTokens.push(token);
                } else if (/\d/.test(cleanToken)) {
                    const isPureNumber = /^\d+$/.test(cleanToken);
                    
                    if (isPureNumber) {
                        // ПРАВИЛО ЧИСТИХ ЧИСЕЛ (наприклад "22", "6"):
                        // 1. Залишаємо, якщо число йде одразу після кореня міни (напр. "Пом 2")
                        let precededByRoot = false;
                        for (let j = i - 1; j >= 0; j--) {
                            let prevClean = tokens[j].replace(/[.,\(\)]/g, '');
                            if (prevClean) {
                                if (MINE_ROOT_RE.test(prevClean)) precededByRoot = true;
                                break;
                            }
                        }

                        // 2. Залишаємо, якщо число стоїть одразу перед словом "шт" (напр. "2 шт")
                        let followedByUnit = false;
                        for (let j = i + 1; j < tokens.length; j++) {
                            let nextClean = tokens[j].replace(/[.,\(\)]/g, '').toLowerCase();
                            if (nextClean) {
                                if (nextClean === 'шт' || nextClean === 'pcs') followedByUnit = true;
                                break;
                            }
                        }

                        if (precededByRoot || followedByUnit) {
                            filteredTokens.push(token);
                        }
                    } else {
                        // Змішані буквено-цифрові модифікатори (напр. "Вт06-2", "3Р", "к2") залишаємо завжди
                        filteredTokens.push(token);
                    }
                }
            }
            
            return filteredTokens.join(' ');
        }

        // Екстрактор назви міни з абзацу
        function extractPayload(p) {
            let mine = "Міна не вказана";
            let firstIdx = -1;

            const upperP = p.toUpperCase();
            SIGNATURES.forEach(sig => {
                let idx = upperP.indexOf(sig);
                if (idx !== -1 && (firstIdx === -1 || idx < firstIdx)) {
                    firstIdx = idx;
                }
            });

            // Відмінювані назви можуть не збігатися з фіксованою сигнатурою.
            for (const match of p.matchAll(INFLECTED_MINE_RE)) {
                if (firstIdx === -1 || match.index < firstIdx) {
                    firstIdx = match.index;
                }
            }

            if (firstIdx !== -1) {
                let tail = p.substring(firstIdx);
                
                // Назва міни завжди на тому самому рядку, що й її перша згадка
                tail = tail.split('\n')[0].trim();
                
                let endIdx = tail.length;
                
                STOP_MARKERS.forEach(marker => {
                    let mIdx = tail.toLowerCase().indexOf(marker.toLowerCase());
                    if (mIdx !== -1 && mIdx < endIdx) endIdx = mIdx;
                });

                let emojiIdx = tail.search(/✅|❌/);
                if (emojiIdx !== -1 && emojiIdx < endIdx) endIdx = emojiIdx;

                mine = tail.substring(0, endIdx).trim();

                // РОЗУМНЕ ВІДСІКАННЯ ДЕТОНАТОРІВ (якщо міна в рядку "Расход")
                if (mine.includes(',')) {
                    const parts = mine.split(',');
                    if (/(эдп|нхпч)/i.test(parts[1])) {
                        mine = parts[0].trim();
                    }
                }
                
                // Пропускаємо через розумний фільтр слів
                mine = smartMineFilter(mine);
                
                // Прибираємо зайві коми та крапки в самому кінці
                mine = mine.replace(/[,\.\-\s\:]+$/, '').trim();
            }
            return mine;
        }

        // MGRS / УСК-2000 — та сама логіка, що в neo-geo-converter.html
        const MGRS_PRECISION = 5; // 1 м (5 цифр на easting і northing)

        const USK_PROJ4 = {
            COMMON: '+proj=tmerc +lat_0=0 +k=1 +y_0=0 +ellps=krass +towgs84=23.92,-141.27,-80.9,0,0.35,0.82,-0.12 +units=m +no_defs',
            ZONES: [
                { id: 4, lon: 21, x: 4500000 },
                { id: 5, lon: 27, x: 5500000 },
                { id: 6, lon: 33, x: 6500000 },
                { id: 7, lon: 39, x: 7500000 }
            ]
        };

        USK_PROJ4.ZONES.forEach(z => {
            proj4.defs(`USK-ZONE-${z.id}`, `${USK_PROJ4.COMMON} +lon_0=${z.lon} +x_0=${z.x}`);
        });

        function resolveUskPair(a, b) {
            const isN = v => v > 4400000 && v < 6000000;
            const isE = v => {
                const s = String(Math.floor(v));
                return s.length === 7 && ['4', '5', '6', '7'].includes(s[0]);
            };

            let N, E;
            if (isN(a) && isE(b)) { N = a; E = b; }
            else if (isN(b) && isE(a)) { N = b; E = a; }
            else if (isE(a) && isN(b)) { E = a; N = b; }
            else return null;

            return { N, E };
        }

        function usk2000ToWgs84(N, E) {
            const zone = parseInt(String(Math.floor(E)).charAt(0), 10);
            if (zone < 4 || zone > 7) return null;

            try {
                const wgs = proj4(`USK-ZONE-${zone}`, 'WGS84', [E, N]);
                return { lat: wgs[1], lon: wgs[0] };
            } catch {
                return null;
            }
        }

        function latLonToMgrs(lat, lon, precision = MGRS_PRECISION) {
            const raw = mgrs.forward([lon, lat], precision);
            const match = raw.match(/^(\d{1,2}[A-Z])([A-Z]{2})(\d+)$/i);
            if (match) {
                const coords = match[3];
                const half = coords.length / 2;
                return `${match[1]} ${match[2]} ${coords.substring(0, half)} ${coords.substring(half)}`;
            }
            return raw;
        }

        function coordsToMgrs(coordsStr) {
            const parts = coordsStr.split(/\s+/).map(Number).filter(n => !isNaN(n));
            if (parts.length < 2) return coordsStr;

            const pair = resolveUskPair(parts[0], parts[1]);
            if (!pair) return coordsStr;

            const wgs = usk2000ToWgs84(pair.N, pair.E);
            if (!wgs) return coordsStr;

            try {
                return latLonToMgrs(wgs.lat, wgs.lon, MGRS_PRECISION);
            } catch {
                return coordsStr;
            }
        }

        function buildOutput(aggregated, formatCoords) {
            const categories = [
                { key: '✅', title: 'Вдало:' },
                { key: '❌', title: 'Невдало:' },
                { key: '❓', title: 'Без статусу:' }
            ];
            let output = '';
            for (const cat of categories) {
                const map = aggregated.get(cat.key);
                if (map && map.size > 0) {
                    output += cat.title + '\n';
                    for (const [coords, data] of map.entries()) {
                        const displayCoords = formatCoords(coords);
                        const minesStr = Array.from(data.mines).join(' + ');
                        const countStr = data.count > 1 ? ` (${data.count} шт)` : '';
                        output += `${displayCoords} - ${minesStr}${countStr}\n`;
                    }
                    output += '\n';
                }
            }
            return output.trim();
        }

        function normalizeMgrsUnits(text) {
            return text.replace(/(?<![а-яіїєґА-ЯІЇЄҐa-zA-Z])(штук|шп\.|шт)(?![а-яіїєґА-ЯІЇЄҐa-zA-Z])/gi, 'од.');
        }

        function processData() {
            const rawText = document.getElementById('inputData').value;
            
            // Розбиваємо на абзаци (якорі: 1., 2., 3...)
            let normalizedText = rawText.replace(/(?:\n|^)\s*(\d{1,2}[\.\)])/g, '\n\n$1');
            const paragraphs = normalizedText.split(/\n\s*\n/);
            const records = [];

            for (let p of paragraphs) {
                p = p.normalize('NFKC').replace(/[\u202F\u00A0]/g, ' ').trim();
                if (!p || p.includes('google.com')) continue;

                // Витягуємо координати
                const coords = extractCoords(p);
                if (!coords) continue;

                // Витягуємо статус
                let status = '❓';
                const hasSuccess = p.includes('✅');
                const hasFail = p.includes('❌');
                if (hasSuccess && hasFail) status = '❌';
                else if (hasSuccess) status = '✅';
                else if (hasFail) status = '❌';

                // Витягуємо міну
                const mine = extractPayload(p);

                records.push({ coords, status, mine });
            }

            // 3. АГРЕГАЦІЯ
            const aggregated = new Map([['✅', new Map()], ['❌', new Map()], ['❓', new Map()]]);
            for (const record of records) {
                if (record.status === '❓') continue;
                const statusMap = aggregated.get(record.status);
                if (!statusMap.has(record.coords)) {
                    statusMap.set(record.coords, { count: 0, mines: new Set() });
                }
                const entry = statusMap.get(record.coords);
                entry.count += 1;
                entry.mines.add(record.mine);
            }

            const knownCoords = new Set([
                ...aggregated.get('✅').keys(),
                ...aggregated.get('❌').keys()
            ]);
            for (const record of records) {
                if (record.status !== '❓' || knownCoords.has(record.coords)) continue;
                const statusMap = aggregated.get('❓');
                if (!statusMap.has(record.coords)) {
                    statusMap.set(record.coords, { count: 0, mines: new Set() });
                }
                const entry = statusMap.get(record.coords);
                entry.count += 1;
                entry.mines.add(record.mine);
            }

            // 4. ВИВІД
            const output = buildOutput(aggregated, coords => coords);
            const mgrsOutput = buildOutput(aggregated, coordsToMgrs);
            const emptyMsg = 'Дані не знайдені.';
            document.getElementById('outputData').value = output || emptyMsg;
            document.getElementById('outputMgrs').value = mgrsOutput ? normalizeMgrsUnits(mgrsOutput) : emptyMsg;

            const statusPill = document.getElementById('statusPill');
            const statusSummary = document.getElementById('statusSummary');
            statusPill.classList.toggle('ready', records.length > 0);
            statusSummary.textContent = records.length > 0
                ? `Знайдено записів: ${records.length}`
                : 'Дані не знайдені';
        }

        async function copyTextarea(textareaId, btn, successText) {
            const output = document.getElementById(textareaId);
            if (!output.value || output.value === 'Дані не знайдені.') return;

            try {
                await navigator.clipboard.writeText(output.value);
            } catch {
                output.select();
                document.execCommand('copy');
            }

            const originalText = btn.innerText;
            btn.innerText = successText;
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 1600);
        }

        function copyResult(btn) {
            copyTextarea('outputData', btn, 'Скопійовано!');
        }

        function copyMgrsCoords(btn) {
            copyTextarea('outputMgrs', btn, 'Скопійовано!');
        }

        function clearData() {
            document.getElementById('inputData').value = '';
            document.getElementById('outputData').value = '';
            document.getElementById('outputMgrs').value = '';
            document.getElementById('inputCounter').textContent = '0 символів';
            document.getElementById('statusSummary').textContent = 'Очікує дані';
            document.getElementById('statusPill').classList.remove('ready');
            document.getElementById('inputData').focus();
        }

        function applyTheme(theme, persist = true) {
            const isLight = theme === 'light';
            document.documentElement.dataset.theme = isLight ? 'light' : 'dark';

            const toggle = document.getElementById('themeToggle');
            toggle.setAttribute('aria-pressed', String(isLight));
            toggle.setAttribute('aria-label', isLight ? 'Увімкнути темну тему' : 'Увімкнути світлу тему');
            document.getElementById('themeIcon').textContent = isLight ? '☾' : '☀';
            document.getElementById('themeLabel').textContent = isLight ? 'Ніч' : 'День';

            if (persist) localStorage.setItem('mines-parser-theme', isLight ? 'light' : 'dark');
        }

        function toggleTheme() {
            const nextTheme = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
            applyTheme(nextTheme);
        }

        applyTheme(document.documentElement.dataset.theme, false);

        const inputData = document.getElementById('inputData');
        inputData.addEventListener('input', () => {
            document.getElementById('inputCounter').textContent = `${inputData.value.length} символів`;
        });

        inputData.addEventListener('keydown', event => {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                event.preventDefault();
                processData();
            }
        });
    </script>
